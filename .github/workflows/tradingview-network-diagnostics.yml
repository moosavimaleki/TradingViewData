name: TradingView Network Diagnostics

on:
  workflow_dispatch:
    inputs:
      symbol:
        description: "TradingView symbol (broker:symbol)"
        required: true
        default: "BLACKBULL:XAUUSD"
      interval:
        description: "TradingView interval (1,5,60,1D,...)"
        required: true
        default: "1"
      probe_timeout:
        description: "Timeout for direct WS probes (seconds)"
        required: true
        default: "16"
      probe_bars:
        description: "Bars requested in TV data probe"
        required: true
        default: "5"
      proxy_count:
        description: "Healthy proxies to discover"
        required: true
        default: "10"
      proxy_min_count:
        description: "Minimum healthy proxies"
        required: true
        default: "1"
      proxy_concurrency:
        description: "Proxy scan concurrency"
        required: true
        default: "64"
      proxy_max_candidates:
        description: "Maximum proxy candidates"
        required: true
        default: "1000"
      proxy_max_runtime:
        description: "Max runtime for proxy scan (seconds)"
        required: true
        default: "500"
      proxy_test_limit:
        description: "How many proxies get deep tests"
        required: true
        default: "4"
      skip_proxy_discovery:
        description: "Skip proxy discovery"
        required: true
        type: boolean
        default: false
      skip_proxy_tests:
        description: "Skip deep proxy tests"
        required: true
        type: boolean
        default: false

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run deep TradingView diagnostics
        env:
          PYTHONUNBUFFERED: "1"
          TV_WS_DEBUG: "1"
          TV_CHART_URL: ${{ secrets.TV_CHART_URL }}
          TV_WS_URL: ${{ secrets.TV_WS_URL }}
          TV_WS_ORIGIN: ${{ secrets.TV_WS_ORIGIN }}
          TV_FASTPASS_CHART_URL: ${{ secrets.TV_FASTPASS_CHART_URL }}
          TV_FASTPASS_WS_URL: ${{ secrets.TV_FASTPASS_WS_URL }}
          TV_FASTPASS_WS_ORIGIN: ${{ secrets.TV_FASTPASS_WS_ORIGIN }}
        run: |
          set -euo pipefail

          CHART_URL="${TV_CHART_URL:-}"
          if [ -z "$CHART_URL" ]; then
            CHART_URL="${TV_FASTPASS_CHART_URL:-https://www.tradingview.com/chart/}"
          fi

          WS_URL="${TV_WS_URL:-}"
          if [ -z "$WS_URL" ]; then
            WS_URL="${TV_FASTPASS_WS_URL:-}"
          fi

          WS_ORIGIN="${TV_WS_ORIGIN:-}"
          if [ -z "$WS_ORIGIN" ]; then
            WS_ORIGIN="${TV_FASTPASS_WS_ORIGIN:-}"
          fi

          echo "diagnostics chart_url=$CHART_URL"
          echo "diagnostics ws_url=${WS_URL:-<auto>}"
          echo "diagnostics ws_origin=${WS_ORIGIN:-<auto>}"
          echo "diagnostics symbol=${{ inputs.symbol }} interval=${{ inputs.interval }}"

          EXTRA_ARGS=()
          if [ "${{ inputs.skip_proxy_discovery }}" = "true" ]; then
            EXTRA_ARGS+=("--skip-proxy-discovery")
          fi
          if [ "${{ inputs.skip_proxy_tests }}" = "true" ]; then
            EXTRA_ARGS+=("--skip-proxy-tests")
          fi

          python scripts/tradingview_network_diagnostics.py \
            --symbol "${{ inputs.symbol }}" \
            --interval "${{ inputs.interval }}" \
            --chart-url "$CHART_URL" \
            --ws-url "$WS_URL" \
            --ws-origin "$WS_ORIGIN" \
            --probe-timeout "${{ inputs.probe_timeout }}" \
            --probe-bars "${{ inputs.probe_bars }}" \
            --proxy-count "${{ inputs.proxy_count }}" \
            --proxy-min-count "${{ inputs.proxy_min_count }}" \
            --proxy-concurrency "${{ inputs.proxy_concurrency }}" \
            --proxy-max-candidates "${{ inputs.proxy_max_candidates }}" \
            --proxy-max-runtime "${{ inputs.proxy_max_runtime }}" \
            --proxy-test-limit "${{ inputs.proxy_test_limit }}" \
            "${EXTRA_ARGS[@]}" \
            --out-json tv_diag_report.json \
            --proxy-out-file .diag_ws_proxies.txt \
            | tee tv_diag.log

      - name: Upload diagnostics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tradingview-network-diagnostics
          if-no-files-found: warn
          path: |
            tv_diag.log
            tv_diag_report.json
            .diag_ws_proxies.txt
