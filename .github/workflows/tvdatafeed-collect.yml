name: Collect Market Data (tvdatafeed)

on:
  schedule:
    - cron: "0 */6 * * *"
    - cron: "0 3-23/6 * * *"
  workflow_dispatch:
    inputs:
      run_mode:
        description: "Run mode: auto|major|minor"
        required: true
        default: "auto"
      config_path:
        description: "Path to jobs config"
        required: true
        default: "config/collect_jobs.json"
      data_root:
        description: "Output data root"
        required: true
        default: "data"
      overlap_bars:
        description: "Overlap bars for incremental update"
        required: true
        default: "30"
      initial_bars:
        description: "Bars to fetch on first run (no existing file)"
        required: true
        default: "5000"
      max_bars:
        description: "Maximum bars per symbol/timeframe request"
        required: true
        default: "5000"

concurrency:
  group: tvdatafeed-collector
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pin RUN_YEAR (UTC)
        run: |
          set -euo pipefail
          YEAR="$(date -u +%Y)"
          RUN_DATE_UTC="$(date -u +%F)"
          RUN_TS_UTC="$(date -u +%FT%TZ)"
          RUN_STAMP_UTC="$(date -u +%Y-%m-%dT%H-%M-%SZ)"
          echo "RUN_YEAR=$YEAR" >> "$GITHUB_ENV"
          echo "RUN_DATE_UTC=$RUN_DATE_UTC" >> "$GITHUB_ENV"
          echo "RUN_TS_UTC=$RUN_TS_UTC" >> "$GITHUB_ENV"
          echo "RUN_STAMP_UTC=$RUN_STAMP_UTC" >> "$GITHUB_ENV"
          echo "Pinned RUN_YEAR=$YEAR"

      - name: Resolve run mode and effective config
        run: |
          set -euo pipefail
          BASE_CONFIG_PATH="${{ github.event.inputs.config_path || 'config/collect_jobs.json' }}"
          EVENT_NAME="${{ github.event_name }}"
          EVENT_SCHEDULE="${{ github.event.schedule || '' }}"
          INPUT_MODE="${{ github.event.inputs.run_mode || 'auto' }}"
          HOUR_UTC="$(date -u +%H)"

          RUN_MODE="auto"
          if [ "$EVENT_NAME" = "schedule" ]; then
            if [ "$EVENT_SCHEDULE" = "0 */6 * * *" ]; then
              RUN_MODE="major"
            elif [ "$EVENT_SCHEDULE" = "0 3-23/6 * * *" ]; then
              RUN_MODE="minor"
            fi
          fi

          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$INPUT_MODE" != "auto" ]; then
            RUN_MODE="$INPUT_MODE"
          fi

          if [ "$RUN_MODE" = "auto" ]; then
            if [ $((10#$HOUR_UTC % 6)) -eq 0 ]; then
              RUN_MODE="major"
            else
              RUN_MODE="minor"
            fi
          fi

          if [ "$RUN_MODE" = "major" ]; then
            EFFECTIVE_CONFIG_PATH="$BASE_CONFIG_PATH"
            echo "mode=major. all timeframes enabled."
          else
            EFFECTIVE_CONFIG_PATH="$(mktemp /tmp/collect_jobs_minor.XXXXXX.json)"
            python -c 'import json,sys; src,dst=sys.argv[1:3]; keep={"10R","100R","1000R"}; d=json.load(open(src,encoding="utf-8")); jobs=d.get("jobs",[]); filtered=[j for j in jobs if str(j.get("source","")).strip().lower() in {"tradingview","tv"} and str(j.get("timeframe","")).strip().upper() in keep]; d["jobs"]=filtered; open(dst,"w",encoding="utf-8").write(json.dumps(d,ensure_ascii=False,indent=2)); print(f"mode=minor jobs={len(filtered)} output={dst}")' "$BASE_CONFIG_PATH" "$EFFECTIVE_CONFIG_PATH"
            echo "mode=minor. only 10R/100R/1000R will run."
          fi

          echo "BASE_CONFIG_PATH=$BASE_CONFIG_PATH" >> "$GITHUB_ENV"
          echo "EFFECTIVE_CONFIG_PATH=$EFFECTIVE_CONFIG_PATH" >> "$GITHUB_ENV"
          echo "RUN_MODE=$RUN_MODE" >> "$GITHUB_ENV"
          echo "RUN_HOUR_UTC=$HOUR_UTC" >> "$GITHUB_ENV"
          echo "RUN_EVENT_NAME=$EVENT_NAME" >> "$GITHUB_ENV"
          echo "RUN_EVENT_SCHEDULE=$EVENT_SCHEDULE" >> "$GITHUB_ENV"
          echo "Resolved RUN_MODE=$RUN_MODE EVENT_NAME=$EVENT_NAME EVENT_SCHEDULE=$EVENT_SCHEDULE RUN_HOUR_UTC=$HOUR_UTC config=$EFFECTIVE_CONFIG_PATH"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          for i in 1 2 3; do
            if pip install -r requirements.txt; then
              break
            fi
            if [ "$i" -eq 3 ]; then
              exit 1
            fi
            sleep 5
          done

      - name: Install rclone (optional persistence)
        env:
          RCLONE_CONF: ${{ secrets.RCLONE_CONF }}
        run: |
          set -euo pipefail
          if [ -n "${RCLONE_CONF:-}" ]; then
            sudo apt-get update
            sudo apt-get install -y rclone
          else
            echo "RCLONE_CONF not set. Skipping rclone install."
          fi

      - name: Configure rclone (OAuth)
        env:
          RCLONE_CONF: ${{ secrets.RCLONE_CONF }}
          GDRIVE_REMOTE_PATH: ${{ vars.GDRIVE_REMOTE_PATH }}
        run: |
          set -euo pipefail
          if [ -z "${RCLONE_CONF:-}" ]; then
            echo "RCLONE_CONF not set. Skipping rclone config."
            echo "RCLONE_ENABLED=0" >> "$GITHUB_ENV"
            exit 0
          fi

          mkdir -p ~/.config/rclone
          printf '%s' "$RCLONE_CONF" > ~/.config/rclone/rclone.conf
          echo "RCLONE_ENABLED=1" >> "$GITHUB_ENV"
          echo "RCLONE_REMOTE_PATH=${GDRIVE_REMOTE_PATH:-gdrive:market-data}" >> "$GITHUB_ENV"

      - name: Validate Drive write access (optional)
        run: |
          set -euo pipefail
          if [ "${RCLONE_ENABLED:-0}" != "1" ]; then
            echo "rclone not configured. Skipping write check."
            exit 0
          fi
          PROBE_FILE="$(mktemp)"
          PROBE_REMOTE="${RCLONE_REMOTE_PATH%/}/.write_probe.txt"
          echo "probe $(date -u +%FT%TZ)" > "$PROBE_FILE"
          if ! OUT="$(rclone copyto "$PROBE_FILE" "$PROBE_REMOTE" -v 2>&1)"; then
            echo "$OUT"
            echo "::error::Drive write check failed. Verify RCLONE_CONF and destination permissions."
            exit 1
          fi
          rclone deletefile "$PROBE_REMOTE" -v || true

      - name: Pull previous tvdatafeed files from Drive (optional)
        run: |
          set -euo pipefail
          if [ "${RCLONE_ENABLED:-0}" != "1" ]; then
            echo "rclone not configured. Skipping pull."
            printf '%s\n' "{\"status\":\"skipped\",\"reason\":\"rclone not configured\",\"run_year\":${RUN_YEAR},\"expected_count\":0,\"listed_count\":0,\"pulled_count\":0,\"remote_absent_count\":0,\"copy_missing_count\":0,\"failed_count\":0,\"pulled_files\":[],\"remote_absent_files\":[],\"copy_missing_files\":[],\"failed_files\":[]}" > tvdatafeed_pull.json
            exit 0
          fi

          CONFIG_PATH="${EFFECTIVE_CONFIG_PATH}"
          DATA_ROOT="${{ github.event.inputs.data_root || 'data' }}"

          mkdir -p "$DATA_ROOT/tradingview"
          python scripts/pull_year_parquets.py \
            --remote "${RCLONE_REMOTE_PATH%/}/data" \
            --local-root "$DATA_ROOT" \
            --config "$CONFIG_PATH" \
            --run-year "$RUN_YEAR" \
            --retries 5 \
            --retry-delay 6 \
            --out-json tvdatafeed_pull.json \
            --verbose

      - name: Run simple tvdatafeed collector
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          set -euo pipefail

          CONFIG_PATH="${EFFECTIVE_CONFIG_PATH}"
          DATA_ROOT="${{ github.event.inputs.data_root || 'data' }}"
          OVERLAP_BARS="${{ github.event.inputs.overlap_bars || '30' }}"
          INITIAL_BARS="${{ github.event.inputs.initial_bars || '5000' }}"
          MAX_BARS="${{ github.event.inputs.max_bars || '5000' }}"

          python collector/simple_tvdatafeed_collector.py \
            --config "$CONFIG_PATH" \
            --data-root "$DATA_ROOT" \
            --overlap-bars "$OVERLAP_BARS" \
            --initial-bars "$INITIAL_BARS" \
            --max-bars "$MAX_BARS" \
            | tee tvdatafeed_summary.json

      - name: Build detailed report artifacts
        if: always() && env.RUN_MODE == 'major'
        run: |
          set -euo pipefail
          if [ ! -f tvdatafeed_summary.json ]; then
            echo '{"ok":[],"skipped":[],"failed":[{"error":"summary file missing"}]}' > tvdatafeed_summary.json
          fi

          if [ ! -f tvdatafeed_pull.json ]; then
            echo '{"status":"missing","reason":"pull report file missing","expected_count":0,"listed_count":0,"pulled_count":0,"remote_absent_count":0,"copy_missing_count":0,"failed_count":0,"pulled_files":[],"remote_absent_files":[],"copy_missing_files":[],"failed_files":[]}' > tvdatafeed_pull.json
          fi

          python scripts/build_tv_report.py \
            --summary tvdatafeed_summary.json \
            --pull-json tvdatafeed_pull.json \
            --out-md tvdatafeed_report.md \
            --run-year "$RUN_YEAR" \
            --run-date "$RUN_DATE_UTC" \
            --run-id "$GITHUB_RUN_ID" \
            --run-url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            --run-at-utc "$RUN_TS_UTC"

          echo "===== tvdatafeed_report.md ====="
          sed -n '1,220p' tvdatafeed_report.md

      - name: Push updated tvdatafeed files to Drive (optional)
        if: always()
        run: |
          set -euo pipefail
          if [ "${RCLONE_ENABLED:-0}" != "1" ]; then
            echo "rclone not configured. Skipping push."
            exit 0
          fi

          DATA_ROOT="${{ github.event.inputs.data_root || 'data' }}"
          if [ ! -d "$DATA_ROOT/tradingview" ]; then
            echo "No local tradingview directory. Skipping push."
            exit 0
          fi

          rclone copy "$DATA_ROOT/tradingview" "${RCLONE_REMOTE_PATH%/}/data/tradingview" \
            --include "**/${RUN_YEAR}.parquet" \
            --create-empty-src-dirs \
            -v

      - name: Commit report artifacts to repository (major only)
        if: always() && env.RUN_MODE == 'major'
        run: |
          set -euo pipefail
          if [ ! -f tvdatafeed_report.md ]; then
            echo "tvdatafeed_report.md not found. Skipping repo commit."
            exit 0
          fi

          REPORT_DIR="artifacts/tvdatafeed"
          REPORT_FILE="$REPORT_DIR/${RUN_STAMP_UTC}.md"
          mkdir -p "$REPORT_DIR"
          cp -f tvdatafeed_report.md "$REPORT_FILE"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "$REPORT_FILE"
          if git diff --cached --quiet; then
            echo "No artifact changes to commit."
            exit 0
          fi

          git commit -m "chore: add tvdatafeed report ${RUN_STAMP_UTC} (run ${GITHUB_RUN_ID})"
          BRANCH="${GITHUB_REF_NAME}"
          for i in 1 2 3; do
            if git pull --rebase origin "$BRANCH" && git push origin "HEAD:${BRANCH}"; then
              exit 0
            fi
            if [ "$i" -eq 3 ]; then
              echo "Failed to push artifact commit after retries."
              exit 1
            fi
            sleep 3
          done

      - name: Upload summary artifact
        if: always() && env.RUN_MODE == 'major'
        uses: actions/upload-artifact@v4
        with:
          name: tvdatafeed-summary-${{ env.RUN_STAMP_UTC }}
          path: |
            tvdatafeed_summary.json
            tvdatafeed_pull.json
            tvdatafeed_report.md
          if-no-files-found: ignore
