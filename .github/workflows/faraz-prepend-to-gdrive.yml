name: Faraz Prepend To TradingView (GDrive)

on:
  workflow_dispatch:
    inputs:
      map_config:
        description: "Path to backfill prepend map config"
        required: true
        default: "config/backfill_prepend_maps.json"
      data_root:
        description: "Local data root"
        required: true
        default: "data"
      log_level:
        description: "Prepend log level"
        required: true
        type: choice
        options:
          - "DEBUG"
          - "INFO"
          - "WARNING"
          - "ERROR"
        default: "DEBUG"
      pull_tradingview_from_drive:
        description: "Pull existing data/tradingview from GDrive before prepend"
        required: true
        type: choice
        options:
          - "true"
          - "false"
        default: "true"
      pull_faraz_from_drive:
        description: "Pull existing data/faraz from GDrive before prepend"
        required: true
        type: choice
        options:
          - "true"
          - "false"
        default: "true"
      push_tradingview_to_drive:
        description: "Push updated data/tradingview to GDrive"
        required: true
        type: choice
        options:
          - "true"
          - "false"
        default: "true"

concurrency:
  group: faraz-prepend-manual
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      PYTHONUNBUFFERED: "1"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Pin run timestamp (UTC)
        run: |
          set -euo pipefail
          echo "RUN_STAMP_UTC=$(date -u +%Y-%m-%dT%H-%M-%SZ)" >> "$GITHUB_ENV"
          echo "RUN_TS_UTC=$(date -u +%FT%TZ)" >> "$GITHUB_ENV"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install rclone
        if: github.event.inputs.pull_tradingview_from_drive == 'true' || github.event.inputs.pull_faraz_from_drive == 'true' || github.event.inputs.push_tradingview_to_drive == 'true'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y rclone

      - name: Configure rclone (required for pull/push)
        if: github.event.inputs.pull_tradingview_from_drive == 'true' || github.event.inputs.pull_faraz_from_drive == 'true' || github.event.inputs.push_tradingview_to_drive == 'true'
        env:
          RCLONE_CONF: ${{ secrets.RCLONE_CONF }}
          GDRIVE_REMOTE_PATH: ${{ vars.GDRIVE_REMOTE_PATH }}
        run: |
          set -euo pipefail
          if [ -z "${RCLONE_CONF:-}" ]; then
            echo "::error::RCLONE_CONF secret is required for Drive pull/push."
            exit 1
          fi
          mkdir -p ~/.config/rclone
          printf '%s' "$RCLONE_CONF" > ~/.config/rclone/rclone.conf
          echo "RCLONE_REMOTE_PATH=${GDRIVE_REMOTE_PATH:-gdrive:market-data}" >> "$GITHUB_ENV"

      - name: Validate Drive write access
        if: github.event.inputs.push_tradingview_to_drive == 'true'
        run: |
          set -euo pipefail
          PROBE_FILE="$(mktemp)"
          PROBE_REMOTE="${RCLONE_REMOTE_PATH%/}/.write_probe.txt"
          echo "probe $(date -u +%FT%TZ)" > "$PROBE_FILE"
          rclone copyto "$PROBE_FILE" "$PROBE_REMOTE" -v
          rclone deletefile "$PROBE_REMOTE" -v || true

      - name: Pull TradingView data from Drive (optional)
        if: github.event.inputs.pull_tradingview_from_drive == 'true'
        run: |
          set -euo pipefail
          DATA_ROOT="${{ github.event.inputs.data_root }}"
          mkdir -p "$DATA_ROOT/tradingview"
          echo "Pulling tradingview data: ${RCLONE_REMOTE_PATH%/}/data/tradingview -> $DATA_ROOT/tradingview"
          rclone copy "${RCLONE_REMOTE_PATH%/}/data/tradingview" "$DATA_ROOT/tradingview" -P --stats 15s -v || true

      - name: Pull Faraz data from Drive (optional)
        if: github.event.inputs.pull_faraz_from_drive == 'true'
        run: |
          set -euo pipefail
          DATA_ROOT="${{ github.event.inputs.data_root }}"
          mkdir -p "$DATA_ROOT/faraz"
          echo "Pulling faraz data: ${RCLONE_REMOTE_PATH%/}/data/faraz -> $DATA_ROOT/faraz"
          rclone copy "${RCLONE_REMOTE_PATH%/}/data/faraz" "$DATA_ROOT/faraz" -P --stats 15s -v || true

      - name: Run prepend from Faraz into TradingView parquet files
        run: |
          set -euo pipefail
          MAP_CONFIG="${{ github.event.inputs.map_config }}"
          DATA_ROOT="${{ github.event.inputs.data_root }}"
          LOG_LEVEL="${{ github.event.inputs.log_level }}"

          echo "MAP_CONFIG=$MAP_CONFIG"
          echo "DATA_ROOT=$DATA_ROOT"
          echo "LOG_LEVEL=$LOG_LEVEL"
          echo "Note: map timeframe fields are treated as hints; script expands to all discovered target timeframes per symbol/broker."

          python backfill/faraz/prepend_from_faraz.py \
            --map-config "$MAP_CONFIG" \
            --data-root "$DATA_ROOT" \
            --log-level "$LOG_LEVEL" \
            | tee faraz_prepend_summary.json

      - name: Push updated TradingView data to Drive
        if: always() && github.event.inputs.push_tradingview_to_drive == 'true'
        run: |
          set -euo pipefail
          DATA_ROOT="${{ github.event.inputs.data_root }}"
          if [ ! -d "$DATA_ROOT/tradingview" ]; then
            echo "::error::No local tradingview directory found at $DATA_ROOT/tradingview"
            exit 1
          fi
          echo "Pushing tradingview data: $DATA_ROOT/tradingview -> ${RCLONE_REMOTE_PATH%/}/data/tradingview"
          rclone copy "$DATA_ROOT/tradingview" "${RCLONE_REMOTE_PATH%/}/data/tradingview" \
            --create-empty-src-dirs \
            -P --stats 15s \
            -v

      - name: Upload prepend artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: faraz-prepend-${{ env.RUN_STAMP_UTC }}
          path: |
            faraz_prepend_summary.json
          if-no-files-found: ignore
