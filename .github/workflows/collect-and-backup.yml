name: Collect & Backup Market Data

on:
  schedule:
    - cron: "0 6 * * *"
    - cron: "0 18 * * *"
    - cron: "55 18 * * *"
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

concurrency:
  group: market-data-collector
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install rclone
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y rclone

      - name: Configure rclone (Google Drive Service Account)
        env:
          GDRIVE_SA_JSON: ${{ secrets.GDRIVE_SA_JSON }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          set -euo pipefail
          test -n "${GDRIVE_SA_JSON}"
          test -n "${GDRIVE_FOLDER_ID}"

          SA_PATH="$GITHUB_WORKSPACE/sa.json"
          printf '%s' "$GDRIVE_SA_JSON" > "$SA_PATH"

          mkdir -p ~/.config/rclone
          printf "%s\n" \
            "[gdrive]" \
            "type = drive" \
            "scope = drive" \
            "service_account_file = $SA_PATH" \
            "root_folder_id = ${GDRIVE_FOLDER_ID}" \
            > ~/.config/rclone/rclone.conf

      - name: Pull manifests + tail chunks from Drive
        run: |
          set -euo pipefail
          mkdir -p data
          python scripts/pull_drive_state.py --remote gdrive: --local-dir data --tail-chunks 2 --verbose

      - name: Discover healthy websocket proxies
        env:
          PYTHONUNBUFFERED: "1"
          TV_AUTH_TOKEN: ${{ secrets.TV_AUTH_TOKEN }}
          TV_PROXY_SCAN_COUNT: ${{ vars.TV_PROXY_SCAN_COUNT }}
          TV_PROXY_SCAN_MIN_COUNT: ${{ vars.TV_PROXY_SCAN_MIN_COUNT }}
          TV_PROXY_SCAN_TIMEOUT: ${{ vars.TV_PROXY_SCAN_TIMEOUT }}
          TV_PROXY_SCAN_CONCURRENCY: ${{ vars.TV_PROXY_SCAN_CONCURRENCY }}
          TV_PROXY_SCAN_MAX_CANDIDATES: ${{ vars.TV_PROXY_SCAN_MAX_CANDIDATES }}
          TV_PROXY_SCAN_MAX_RUNTIME: ${{ vars.TV_PROXY_SCAN_MAX_RUNTIME }}
          TV_PROXY_TEST_MIN_BARS: ${{ vars.TV_PROXY_TEST_MIN_BARS }}
        run: |
          set -euo pipefail

          SCAN_COUNT="${TV_PROXY_SCAN_COUNT:-10}"
          SCAN_MIN_COUNT="${TV_PROXY_SCAN_MIN_COUNT:-3}"
          SCAN_TIMEOUT="${TV_PROXY_SCAN_TIMEOUT:-12}"
          SCAN_CONCURRENCY="${TV_PROXY_SCAN_CONCURRENCY:-64}"
          SCAN_MAX_CANDIDATES="${TV_PROXY_SCAN_MAX_CANDIDATES:-1000}"
          SCAN_MAX_RUNTIME="${TV_PROXY_SCAN_MAX_RUNTIME:-500}"
          SCAN_MIN_BARS="${TV_PROXY_TEST_MIN_BARS:-8}"

          timeout 9m python scripts/select_ws_proxies.py \
            --count "$SCAN_COUNT" \
            --min-count "$SCAN_MIN_COUNT" \
            --timeout "$SCAN_TIMEOUT" \
            --concurrency "$SCAN_CONCURRENCY" \
            --max-candidates "$SCAN_MAX_CANDIDATES" \
            --progress-interval 5 \
            --max-runtime "$SCAN_MAX_RUNTIME" \
            --test-symbol BLACKBULL:XAUUSD \
            --test-interval 1 \
            --test-min-bars "$SCAN_MIN_BARS" \
            --out-file .ws_proxies.txt

          echo "selected_proxy_count=$(wc -l < .ws_proxies.txt)"

          {
            echo "TV_WS_PROXY<<EOF"
            cat .ws_proxies.txt
            echo "EOF"
            echo "TV_FASTPASS_WS_PROXY<<EOF"
            cat .ws_proxies.txt
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Run collector
        id: collector
        env:
          FARAZ_COOKIES: ${{ secrets.FARAZ_COOKIES }}
          TV_FASTPASS_COOKIE_STRING: ${{ secrets.TV_FASTPASS_COOKIE_STRING }}
          TV_FASTPASS_CHART_URL: ${{ secrets.TV_FASTPASS_CHART_URL }}
          TV_FASTPASS_WS_URL: ${{ secrets.TV_FASTPASS_WS_URL }}
          TV_FASTPASS_WS_ORIGIN: ${{ secrets.TV_FASTPASS_WS_ORIGIN }}
          TV_AUTH_TOKEN: ${{ secrets.TV_AUTH_TOKEN }}
          TV_WS_DEBUG: ${{ vars.TV_WS_DEBUG }}
          DATA_COLLECTOR_LOG_LEVEL: ${{ vars.DATA_COLLECTOR_LOG_LEVEL }}
          TV_BACKFILL_MAX_EMPTY_WINDOWS: ${{ vars.TV_BACKFILL_MAX_EMPTY_WINDOWS }}
          TV_WS_TIMEOUT_SEC: ${{ vars.TV_WS_TIMEOUT_SEC }}
          TV_WS_PAGE_STEP: ${{ vars.TV_WS_PAGE_STEP }}
          TV_WS_MAX_FETCH_BARS: ${{ vars.TV_WS_MAX_FETCH_BARS }}
          TV_WS_DEFAULT_FETCH_BARS: ${{ vars.TV_WS_DEFAULT_FETCH_BARS }}
          TV_WS_RETRIES: ${{ vars.TV_WS_RETRIES }}
          TV_WS_RETRY_BASE_SLEEP_SEC: ${{ vars.TV_WS_RETRY_BASE_SLEEP_SEC }}
          TV_WS_RETRY_MAX_SLEEP_SEC: ${{ vars.TV_WS_RETRY_MAX_SLEEP_SEC }}
          TV_WS_MAX_PROXY_ATTEMPTS: ${{ vars.TV_WS_MAX_PROXY_ATTEMPTS }}
          TV_WS_DIRECT_FIRST: ${{ vars.TV_WS_DIRECT_FIRST }}
        run: |
          set -euo pipefail

          export TV_WS_DEBUG="${TV_WS_DEBUG:-1}"
          export TV_BACKFILL_MAX_EMPTY_WINDOWS="${TV_BACKFILL_MAX_EMPTY_WINDOWS:-3}"
          export TV_WS_TIMEOUT_SEC="${TV_WS_TIMEOUT_SEC:-60}"
          export TV_WS_PAGE_STEP="${TV_WS_PAGE_STEP:-1000}"
          export TV_WS_MAX_FETCH_BARS="${TV_WS_MAX_FETCH_BARS:-6000}"
          export TV_WS_DEFAULT_FETCH_BARS="${TV_WS_DEFAULT_FETCH_BARS:-3000}"
          export TV_WS_RETRIES="${TV_WS_RETRIES:-4}"
          export TV_WS_RETRY_BASE_SLEEP_SEC="${TV_WS_RETRY_BASE_SLEEP_SEC:-1.5}"
          export TV_WS_RETRY_MAX_SLEEP_SEC="${TV_WS_RETRY_MAX_SLEEP_SEC:-15}"
          export TV_WS_MAX_PROXY_ATTEMPTS="${TV_WS_MAX_PROXY_ATTEMPTS:-4}"
          export TV_WS_DIRECT_FIRST="${TV_WS_DIRECT_FIRST:-1}"

          python -m data_collector.run --config config/collect_jobs.json --fail-on-error \
            2> >(tee collector_stderr.log >&2) \
            | tee run_summary.json

      - name: Upload changed data to Drive
        if: always()
        run: |
          set -euo pipefail
          rclone copy ./data gdrive: \
            --include "**/manifest.json" \
            --include "**/*.csv.gz" \
            --include "**/*.csv" \
            --create-empty-src-dirs \
            -v

      - name: Upload run summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-summary
          path: |
            run_summary.json
            collector_stderr.log
          if-no-files-found: ignore
