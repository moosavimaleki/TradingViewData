name: Collect Market Data (tvdatafeed)

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      config_path:
        description: "Path to jobs config"
        required: true
        default: "config/collect_jobs.json"
      data_root:
        description: "Output data root"
        required: true
        default: "data"
      overlap_bars:
        description: "Overlap bars for incremental update"
        required: true
        default: "30"
      initial_bars:
        description: "Bars to fetch on first run (no existing file)"
        required: true
        default: "5000"
      max_bars:
        description: "Maximum bars per symbol/timeframe request"
        required: true
        default: "5000"

concurrency:
  group: tvdatafeed-collector
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          for i in 1 2 3; do
            if pip install -r requirements.txt; then
              break
            fi
            if [ "$i" -eq 3 ]; then
              exit 1
            fi
            sleep 5
          done

      - name: Install rclone (optional persistence)
        env:
          RCLONE_CONF: ${{ secrets.RCLONE_CONF }}
          GDRIVE_SA_JSON: ${{ secrets.GDRIVE_SA_JSON }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          set -euo pipefail
          if [ -n "${RCLONE_CONF:-}" ] || { [ -n "${GDRIVE_SA_JSON:-}" ] && [ -n "${GDRIVE_FOLDER_ID:-}" ]; }; then
            sudo apt-get update
            sudo apt-get install -y rclone
          else
            echo "Google Drive secrets not set. Skipping rclone install."
          fi

      - name: Configure rclone (optional, OAuth preferred)
        env:
          RCLONE_CONF: ${{ secrets.RCLONE_CONF }}
          GDRIVE_SA_JSON: ${{ secrets.GDRIVE_SA_JSON }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          GDRIVE_SHARED_DRIVE_ID: ${{ secrets.GDRIVE_SHARED_DRIVE_ID }}
          GDRIVE_REMOTE_PATH: ${{ vars.GDRIVE_REMOTE_PATH }}
        run: |
          set -euo pipefail
          if [ -z "${RCLONE_CONF:-}" ] && { [ -z "${GDRIVE_SA_JSON:-}" ] || [ -z "${GDRIVE_FOLDER_ID:-}" ]; }; then
            echo "Google Drive secrets not set. Skipping rclone config."
            echo "RCLONE_ENABLED=0" >> "$GITHUB_ENV"
            exit 0
          fi

          mkdir -p ~/.config/rclone
          if [ -n "${RCLONE_CONF:-}" ]; then
            printf '%s' "$RCLONE_CONF" > ~/.config/rclone/rclone.conf
            echo "RCLONE_ENABLED=1" >> "$GITHUB_ENV"
            echo "RCLONE_REMOTE_PATH=${GDRIVE_REMOTE_PATH:-gdrive:market-data}" >> "$GITHUB_ENV"
            echo "RCLONE_CONFIG_MODE=oauth" >> "$GITHUB_ENV"
            exit 0
          fi

          SA_PATH="$GITHUB_WORKSPACE/sa.json"
          printf '%s' "$GDRIVE_SA_JSON" > "$SA_PATH"

          printf "%s\n" \
            "[gdrive]" \
            "type = drive" \
            "scope = drive" \
            "service_account_file = $SA_PATH" \
            "root_folder_id = ${GDRIVE_FOLDER_ID}" \
            > ~/.config/rclone/rclone.conf
          if [ -n "${GDRIVE_SHARED_DRIVE_ID:-}" ]; then
            printf "%s\n" "team_drive = ${GDRIVE_SHARED_DRIVE_ID}" >> ~/.config/rclone/rclone.conf
          fi
          echo "RCLONE_ENABLED=1" >> "$GITHUB_ENV"
          echo "RCLONE_REMOTE_PATH=${GDRIVE_REMOTE_PATH:-gdrive:}" >> "$GITHUB_ENV"
          echo "RCLONE_CONFIG_MODE=service_account" >> "$GITHUB_ENV"

      - name: Validate Drive write access (optional)
        run: |
          set -euo pipefail
          if [ "${RCLONE_ENABLED:-0}" != "1" ]; then
            echo "rclone not configured. Skipping write check."
            exit 0
          fi
          PROBE_FILE="$(mktemp)"
          PROBE_REMOTE="${RCLONE_REMOTE_PATH%/}/.write_probe.txt"
          echo "probe $(date -u +%FT%TZ)" > "$PROBE_FILE"
          if ! OUT="$(rclone copyto "$PROBE_FILE" "$PROBE_REMOTE" -v 2>&1)"; then
            echo "$OUT"
            if echo "$OUT" | grep -qi "storageQuotaExceeded\|Service Accounts do not have storage quota"; then
              echo "::error::Service Account cannot upload to My Drive. Use RCLONE_CONF (OAuth) or a Shared Drive."
            fi
            exit 1
          fi
          rclone deletefile "$PROBE_REMOTE" -v || true

      - name: Pull previous tvdatafeed files from Drive (optional)
        run: |
          set -euo pipefail
          if [ "${RCLONE_ENABLED:-0}" != "1" ]; then
            echo "rclone not configured. Skipping pull."
            exit 0
          fi

          mkdir -p data/tradingview
          rclone copy "${RCLONE_REMOTE_PATH%/}/data/tradingview" ./data/tradingview -v || true

      - name: Run simple tvdatafeed collector
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          set -euo pipefail

          CONFIG_PATH="${{ github.event.inputs.config_path || 'config/collect_jobs.json' }}"
          DATA_ROOT="${{ github.event.inputs.data_root || 'data' }}"
          OVERLAP_BARS="${{ github.event.inputs.overlap_bars || '30' }}"
          INITIAL_BARS="${{ github.event.inputs.initial_bars || '5000' }}"
          MAX_BARS="${{ github.event.inputs.max_bars || '5000' }}"

          python collector/simple_tvdatafeed_collector.py \
            --config "$CONFIG_PATH" \
            --data-root "$DATA_ROOT" \
            --overlap-bars "$OVERLAP_BARS" \
            --initial-bars "$INITIAL_BARS" \
            --max-bars "$MAX_BARS" \
            | tee tvdatafeed_summary.json

      - name: Push updated tvdatafeed files to Drive (optional)
        if: always()
        run: |
          set -euo pipefail
          if [ "${RCLONE_ENABLED:-0}" != "1" ]; then
            echo "rclone not configured. Skipping push."
            exit 0
          fi

          rclone copy ./data/tradingview "${RCLONE_REMOTE_PATH%/}/data/tradingview" \
            --include "**/data.csv" \
            --create-empty-src-dirs \
            -v

      - name: Upload summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tvdatafeed-summary
          path: tvdatafeed_summary.json
          if-no-files-found: ignore
